<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2a1e"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3ECF8E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3ECF8E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid overlay -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left half: outlined tile + green kanji, centred on y=315. -->
  <g transform="translate(75 65)">
    <circle cx="225" cy="250" r="260" fill="url(#glow)"/>
    <rect x="0" y="0" width="450" height="500" rx="48" ry="48"
          fill="none" stroke="#3ECF8E" stroke-width="3"/>
    <text x="225" y="350"
          font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', 'Source Han Serif', serif"
          font-size="320"
          font-weight="700"
          fill="#3ECF8E"
          text-anchor="middle">絆</text>
    <text x="225" y="448"
          font-family="Inter"
          font-size="32"
          font-weight="600"
          fill="#3ECF8E"
          fill-opacity="0.85"
          letter-spacing="3"
          text-anchor="middle">KIZUNA</text>
  </g>

  <!-- Right half: text group vertically centred on y=315 (matches the
       left tile's centre). Inner content is ~360 high; translate-y =
       315 - 180 = 135. -->
  <g transform="translate(610 135)">
    <!-- Eyebrow tag -->
    <rect x="0" y="0" width="200" height="38" rx="19"
          fill="#3ECF8E" fill-opacity="0.12"
          stroke="#3ECF8E" stroke-opacity="0.4" stroke-width="1.5"/>
    <circle cx="22" cy="19" r="5" fill="#3ECF8E"/>
    <text x="40" y="25"
          font-family="Inter"
          font-size="14"
          font-weight="600"
          fill="#3ECF8E"
          letter-spacing="2">SUPAFEST 2027</text>

    <!-- Title -->
    <text x="0" y="120"
          font-family="Inter"
          font-size="76"
          font-weight="700"
          fill="#ffffff"
          letter-spacing="-2">Kizuna</text>

    <!-- Description: two lines with comfortable line-height -->
    <text x="0" y="190"
          font-family="Inter"
          font-size="34"
          font-weight="500"
          fill="#ffffff"
          fill-opacity="0.88"
          letter-spacing="-0.5">
      <tspan x="0" dy="0">Building an enduring</tspan>
      <tspan x="0" dy="46">bond among teammates</tspan>
    </text>

    <!-- Sub-line -->
    <text x="0" y="310"
          font-family="Inter"
          font-size="18"
          font-weight="400"
          fill="#ffffff"
          fill-opacity="0.55">The community platform powering Supabase retreats</text>

    <!-- Built on Supabase tag -->
    <text x="0" y="350"
          font-family="Inter"
          font-size="13"
          font-weight="600"
          fill="#3ECF8E"
          letter-spacing="1.5">BUILT ON SUPABASE</text>
  </g>
</svg>
