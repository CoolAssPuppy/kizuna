<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confirm your new email address</title>
</head>
<body style="margin: 0; padding: 0; background-color: #1c1c1c; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fafafa;">
  <span style="display: none; font-size: 1px; color: #1c1c1c; max-height: 0; overflow: hidden;">Final step to update your email.</span>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #1c1c1c;">
    <tr>
      <td align="center" style="padding: 32px 16px;">
        <table role="presentation" cellpadding="0" cellspacing="0" width="600" style="max-width: 600px; width: 100%;">
          <tr>
            <td style="padding: 0 24px 16px;">
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td>
                    <span style="
                      display: inline-block;
                      width: 32px;
                      height: 32px;
                      background-color: #262626;
                      color: #fafafa;
                      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                      font-weight: 700;
                      font-size: 18px;
                      text-align: center;
                      line-height: 32px;
                      border-radius: 8px;
                    ">絆</span>
                    <span style="font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fafafa; font-weight: 600; font-size: 14px; padding-left: 8px; vertical-align: middle;">Kizuna</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="background-color: #202020; border: 1px solid #2d2d2d; border-radius: 10px; padding: 24px;">
              <h1 style="margin: 0 0 12px; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fafafa; font-size: 24px; font-weight: 600; line-height: 1.25;">Confirm your new email</h1>
              <div style="font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fafafa; font-size: 14px; line-height: 22px;"><p>Your Kizuna account email is changing to {{ .NewEmail }}. Confirm to complete the change.</p></div>
              
        <table role="presentation" cellpadding="0" cellspacing="0" style="margin-top: 24px;">
          <tr>
            <td>
              <a href="{{ .ConfirmationURL }}" style="
                display: inline-block;
                padding: 12px 24px;
                background-color: #3ECF8E;
                color: #0a0a0c;
                font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                font-size: 14px;
                font-weight: 600;
                text-decoration: none;
                border-radius: 10px;
              ">Confirm email change</a>
            </td>
          </tr>
        </table>
            </td>
          </tr>
          <tr>
            <td style="padding: 24px 24px; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #a1a1aa; font-size: 12px; line-height: 18px;">
              Kizuna · Powered by Supabase
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
