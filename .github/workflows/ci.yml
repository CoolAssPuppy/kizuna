name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: typecheck · lint · format · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Locale parity
        run: npm run i18n:check

      - name: Unit and component tests
        run: npm run test:run

      - name: Build
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-publishable-placeholder
        run: npm run build

  database:
    name: schemas · pgTAP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start --exclude vector,realtime,studio,inbucket,imgproxy,storage-api,edge-runtime

      - name: Apply declarative schemas + fixtures
        run: npm run db:apply

      - name: Run pgTAP suite
        run: supabase test db

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

# Playwright e2e is intentionally NOT part of CI.
# Run end-to-end specs locally with `npm run test:e2e` against the local
# Supabase + Vite dev server. Adding e2e to CI requires a full Supabase
# stack on the runner and is more friction than value at this stage.
